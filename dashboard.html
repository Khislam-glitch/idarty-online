<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم - إدارتي أونلاين</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#1E40AF'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100">

  <!-- Sidebar -->
  <div class="flex">
    <aside class="w-64 bg-white shadow-lg min-h-screen p-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-8">إدارتي أونلاين</h2>
      <nav class="space-y-4">
        <a href="#" class="block py-2 px-4 bg-primary text-white rounded-lg font-medium">لوحة التحكم</a>
        <a href="#" class="block py-2 px-4 text-gray-600 hover:bg-gray-100 rounded-lg">الملف الشخصي</a>
        <a href="#" class="block py-2 px-4 text-gray-600 hover:bg-gray-100 rounded-lg">الإعدادات</a>
      </nav>
      <button id="logoutBtn" class="mt-8 w-full py-2 px-4 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">تسجيل الخروج</button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      <header class="mb-8">
        <h1 id="greeting" class="text-3xl font-bold text-gray-800">مرحباً بك في لوحة التحكم!</h1>
        <p class="text-gray-600">نظرة عامة على نشاطك.</p>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500 text-sm font-medium">المهام المكتملة</h3>
          <p class="text-2xl font-bold mt-2">24</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500 text-sm font-medium">المشاريع النشطة</h3>
          <p class="text-2xl font-bold mt-2">5</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500 text-sm font-medium">الإشعارات</h3>
          <p class="text-2xl font-bold mt-2">3</p>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold text-gray-800 mb-4">آخر النشاطات</h2>
        <ul class="space-y-2">
          <li class="text-gray-600">قمت بإكمال مهمة "مراجعة العقد".</li>
          <li class="text-gray-600">تم تحديث مشروع "تطوير الموقع".</li>
          <li class="text-gray-600">لديك اجتماع مجدول غداً الساعة 10 صباحاً.</li>
        </ul>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const greetingEl = document.getElementById('greeting');
      const logoutBtn = document.getElementById('logoutBtn');

      // Security Gate: Validate session and role
      const { data: { session } } = await window.supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const profile = await getProfile(session.user.id);
      if (!profile || profile.role !== 'user') {
        window.location.href = 'login.html';
        return;
      }

      greetingEl.textContent = `مرحباً، ${profile.full_name}!`;

      logoutBtn.addEventListener('click', async () => {
        await window.supabase.auth.signOut();
        window.location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
