# ─────────────────────────────────────────────────────────────────
# netlify.toml  —  Netlify site configuration
# Environment variables (SUPABASE_URL, SUPABASE_ANON_KEY) are set
# in the Netlify UI under Site → Environment variables.
# ─────────────────────────────────────────────────────────────────

[build]
  # Source files live in src/, built output goes to dist/
  base    = "."
  command = "bash build.sh"
  publish = "dist"

# ── Security headers (production hardening) ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent your site from being embedded in iframes (clickjacking)
    X-Frame-Options = "DENY"

    # Block MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Only allow HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Content Security Policy
    # Allows: self, Supabase, CDN scripts (Tailwind, FA, Supabase-js, Chart.js, fonts)
    Content-Security-Policy = """
      default-src 'self';
      script-src  'self' 'unsafe-inline'
                  https://cdn.tailwindcss.com
                  https://cdn.jsdelivr.net
                  https://cdnjs.cloudflare.com
                  https://fonts.googleapis.com;
      style-src   'self' 'unsafe-inline'
                  https://fonts.googleapis.com
                  https://cdnjs.cloudflare.com;
      font-src    'self'
                  https://fonts.gstatic.com
                  https://cdnjs.cloudflare.com;
      img-src     'self' data: blob:
                  https://images.unsplash.com
                  https://whatthelogo.com
                  https://images.seeklogo.com;
      connect-src 'self'
                  https://*.supabase.co
                  wss://*.supabase.co;
      frame-src   'none';
      object-src  'none';
    """

    # Permissions policy (disable unused browser features)
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ─────────────────────────────
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect all 404s to login (SPA-style guard) ─────────────────
[[redirects]]
  from   = "/*"
  to     = "/login.html"
  status = 404
