<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - إدارتي أونلاين</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#1E40AF'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
  <div id="loginCard" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300">
    <div class="p-8">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">مرحباً بك!</h1>
      <p class="text-gray-500 text-center mb-8">سجّل الدخول إلى حسابك</p>

      <div id="errorAlert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 text-sm"></div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
          <input type="email" id="email" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition" 
            placeholder="أدخل بريدك الإلكتروني" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
            placeholder="أدخل كلمة المرور" />
        </div>
        <button type="submit" id="submitButton"
          class="w-full bg-gradient-to-r from-primary to-secondary text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition flex items-center justify-center">
          <span id="buttonText">تسجيل الدخول</span>
          <svg id="spinner" class="hidden animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const loginCard = document.getElementById('loginCard');
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitButton = document.getElementById('submitButton');
      const buttonText = document.getElementById('buttonText');
      const spinner = document.getElementById('spinner');
      const errorAlert = document.getElementById('errorAlert');

      // Check for existing session
      const { data: { session } } = await window.supabase.auth.getSession();
      if (session) {
        const profile = await getProfile(session.user.id);
        if (profile) {
          window.location.href = profile.role === 'admin' ? 'admin.html' : 'dashboard.html';
          return;
        }
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorAlert.classList.add('hidden');
        submitButton.disabled = true;
        buttonText.classList.add('hidden');
        spinner.classList.remove('hidden');

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        const { data, error } = await window.supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          errorAlert.textContent = error.message || 'حدث خطأ أثناء تسجيل الدخول.';
          errorAlert.classList.remove('hidden');
          submitButton.disabled = false;
          buttonText.classList.remove('hidden');
          spinner.classList.add('hidden');
        } else if (data.session) {
          const profile = await getProfile(data.user.id);
          if (profile) {
            window.location.href = profile.role === 'admin' ? 'admin.html' : 'dashboard.html';
          } else {
            errorAlert.textContent = 'لم يتم العثور على ملف تعريف المستخدم.';
            errorAlert.classList.remove('hidden');
            submitButton.disabled = false;
            buttonText.classList.remove('hidden');
            spinner.classList.add('hidden');
          }
        }
      });
    });
  </script>
</body>
</html>
