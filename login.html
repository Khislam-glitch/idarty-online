<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - إدارتي أونلاين</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .login-container {
        background: white;
        border-radius: 30px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
        animation: fadeIn 0.5s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 2rem;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 0.9rem;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: right;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }
      input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: 0.3s;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .register-link {
        margin-top: 20px;
        color: #666;
      }
      .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }
      .error {
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .logo {
        font-size: 3rem;
        margin-bottom: 20px;
      }
      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">📋</div>
      <h1>إدارتي أونلاين</h1>
      <p class="subtitle">تسجيل الدخول إلى المنصة</p>
      <div id="errorMsg" class="error"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input
            type="email"
            id="email"
            required
            placeholder="example@univ-ouargla.dz"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input
            type="password"
            id="password"
            required
            placeholder="********"
            autocomplete="current-password"
          />
        </div>
        <button type="submit" id="loginBtn">دخول</button>
      </form>
      <div class="register-link">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
      // If user already has a session, redirect immediately
      (async () => {
        try {
          const {
            data: { user },
          } = await supabase.auth.getUser();
          if (user) {
            const profile = await getProfile(user.id);
            window.location.href =
              profile?.role === "admin" ? "admin.html" : "dashboard.html";
          }
        } catch (_) {}
      })();

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = document.getElementById("loginBtn");
          const errEl = document.getElementById("errorMsg");
          errEl.style.display = "none";
          const original = btn.innerHTML;
          btn.innerHTML =
            '<span class="loading-spinner"></span> جاري التسجيل...';
          btn.disabled = true;

          try {
            const { data, error } = await supabase.auth.signInWithPassword({
              email,
              password,
            });
            if (error) throw error;
            const profile = await getProfile(data.user.id);
            window.location.href =
              profile?.role === "admin" ? "admin.html" : "dashboard.html";
          } catch (err) {
            errEl.textContent = err.message || "حدث خطأ في الاتصال";
            errEl.style.display = "block";
            btn.innerHTML = original;
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
