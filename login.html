<!-- login.html -->
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارتي أونلاين | تسجيل الدخول</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Tajawal", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-up {
        animation: fadeUp 0.6s ease-out forwards;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-slate-100 via-indigo-100 to-cyan-100 flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md animate-fade-up">
      <div class="glass rounded-3xl shadow-2xl p-8 md:p-10">
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white shadow-lg mb-4"
          >
            <svg
              class="w-8 h-8"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-800">تسجيل الدخول</h1>
          <p class="text-slate-500 mt-1 text-sm">
            أهلاً بك مجدداً في إدارتي أونلاين
          </p>
        </div>
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"
              >البريد الإلكتروني</label
            >
            <input
              type="email"
              name="email"
              required
              class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-sm"
              placeholder="name@company.com"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"
              >كلمة المرور</label
            >
            <input
              type="password"
              name="password"
              required
              minlength="6"
              class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-sm"
              placeholder="••••••••"
            />
          </div>
          <button
            type="submit"
            id="login-btn"
            class="w-full py-3.5 rounded-xl bg-gradient-to-l from-indigo-600 to-violet-600 text-white font-bold shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300 transform hover:-translate-y-0.5 transition-all duration-200"
          >
            تسجيل الدخول
          </button>
        </form>
        <div class="mt-6 text-center">
          <p class="text-sm text-slate-500">
            ليس لديك حساب؟
            <a
              href="register.html"
              class="text-indigo-600 font-bold hover:text-violet-600 transition-colors"
              >إنشاء حساب جديد</a
            >
          </p>
          <a
            href="public.html"
            class="inline-block mt-3 text-xs text-slate-400 hover:text-slate-600 transition-colors"
            >العودة للبوابة العامة</a
          >
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
      (async () => {
        await App.init();
        const {
          data: { session },
        } = await window.supabase.auth.getSession();
        if (session) {
          const u = await window.supabase
            .from("profiles")
            .select("role")
            .eq("id", session.user.id)
            .single();
          window.location.href =
            u.data?.role === "admin" ? "admin.html" : "dashboard.html";
        }
        document
          .getElementById("login-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("login-btn");
            App.setLoading(btn, true);
            try {
              const fd = new FormData(e.target);
              await App.login(fd.get("email"), fd.get("password"));
              App.toast("تم تسجيل الدخول بنجاح", "success");
              setTimeout(() => {
                window.location.href =
                  App.profile?.role === "admin"
                    ? "admin.html"
                    : "dashboard.html";
              }, 400);
            } catch (err) {
              App.toast(err.message || "فشل تسجيل الدخول", "error");
            } finally {
              App.setLoading(btn, false);
            }
          });
      })();
    </script>
  </body>
</html>
