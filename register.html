<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنشاء حساب - إدارتي أونلاين</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#1E40AF'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="p-8">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">أنشئ حسابك</h1>
      <p class="text-gray-500 text-center mb-8">ابدأ رحلتك مع إدارتي أونلاين</p>

      <div id="errorAlert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 text-sm"></div>

      <form id="registerForm" class="space-y-6">
        <div>
          <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">الاسم الكامل</label>
          <input type="text" id="fullName" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition" 
            placeholder="أدخل اسمك الكامل" />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
          <input type="email" id="email" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition" 
            placeholder="أدخل بريدك الإلكتروني" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
            placeholder="أدخل كلمة مرور قوية" />
        </div>
        <div>
          <label for="role" class="block text-sm font-medium text-gray-700 mb-1">النوع</label>
          <select id="role" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
            <option value="" disabled selected>اختر نوع الحساب</option>
            <option value="user">مستخدم عادي</option>
            <option value="admin">مسؤول</option>
          </select>
        </div>
        <button type="submit" id="submitButton"
          class="w-full bg-gradient-to-r from-primary to-secondary text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition flex items-center justify-center">
          <span id="buttonText">إنشاء الحساب</span>
          <svg id="spinner" class="hidden animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const registerForm = document.getElementById('registerForm');
      const fullNameInput = document.getElementById('fullName');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const roleSelect = document.getElementById('role');
      const submitButton = document.getElementById('submitButton');
      const buttonText = document.getElementById('buttonText');
      const spinner = document.getElementById('spinner');
      const errorAlert = document.getElementById('errorAlert');

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorAlert.classList.add('hidden');
        submitButton.disabled = true;
        buttonText.classList.add('hidden');
        spinner.classList.remove('hidden');

        const fullName = fullNameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const role = roleSelect.value;

        const { data, error } = await window.supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName }
          }
        });

        if (error) {
          errorAlert.textContent = error.message || 'حدث خطأ أثناء التسجيل.';
          errorAlert.classList.remove('hidden');
        } else if (data.user) {
          // Insert into profiles table
          const { error: profileError } = await window.supabase
            .from('profiles')
            .insert({ id: data.user.id, full_name: fullName, role });

          if (profileError) {
            errorAlert.textContent = 'تم إنشاء الحساب، لكن حدث خطأ عند إنشاء الملف الشخصي: ' + profileError.message;
            errorAlert.classList.remove('hidden');
          } else {
            window.location.href = 'login.html';
            return;
          }
        }

        submitButton.disabled = false;
        buttonText.classList.remove('hidden');
        spinner.classList.add('hidden');
      });
    });
  </script>
</body>
</html>
