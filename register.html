<!-- register.html -->
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارتي أونلاين | إنشاء حساب</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Tajawal", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-up {
        animation: fadeUp 0.6s ease-out forwards;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-slate-100 via-indigo-100 to-cyan-100 flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md animate-fade-up">
      <div class="glass rounded-3xl shadow-2xl p-8 md:p-10">
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-violet-600 to-cyan-600 text-white shadow-lg mb-4"
          >
            <svg
              class="w-8 h-8"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
              ></path>
            </svg>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-800">
            إنشاء حساب جديد
          </h1>
          <p class="text-slate-500 mt-1 text-sm">
            انضم إلى منصة إدارتي أونلاين
          </p>
        </div>
        <form id="reg-form" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"
              >الاسم الكامل</label
            >
            <input
              type="text"
              name="full_name"
              required
              class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-sm"
              placeholder="محمد أحمد"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"
              >البريد الإلكتروني</label
            >
            <input
              type="email"
              name="email"
              required
              class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-sm"
              placeholder="name@company.com"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"
              >كلمة المرور</label
            >
            <input
              type="password"
              name="password"
              required
              minlength="6"
              class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-sm"
              placeholder="6 أحرف على الأقل"
            />
          </div>
          <button
            type="submit"
            id="reg-btn"
            class="w-full py-3.5 rounded-xl bg-gradient-to-l from-violet-600 to-cyan-600 text-white font-bold shadow-lg shadow-violet-200 hover:shadow-xl hover:shadow-violet-300 transform hover:-translate-y-0.5 transition-all duration-200"
          >
            إنشاء الحساب
          </button>
        </form>
        <div class="mt-6 text-center">
          <p class="text-sm text-slate-500">
            لديك حساب بالفعل؟
            <a
              href="login.html"
              class="text-indigo-600 font-bold hover:text-violet-600 transition-colors"
              >تسجيل الدخول</a
            >
          </p>
          <a
            href="public.html"
            class="inline-block mt-3 text-xs text-slate-400 hover:text-slate-600 transition-colors"
            >العودة للبوابة العامة</a
          >
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
      (async () => {
        await App.init();
        const {
          data: { session },
        } = await window.supabase.auth.getSession();
        if (session) {
          window.location.href = "dashboard.html";
        }
        document
          .getElementById("reg-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("reg-btn");
            App.setLoading(btn, true);
            try {
              const fd = new FormData(e.target);
              await App.register(
                fd.get("email"),
                fd.get("password"),
                fd.get("full_name"),
              );
              App.toast("تم إنشاء الحساب بنجاح", "success");
              setTimeout(() => (window.location.href = "login.html"), 600);
            } catch (err) {
              App.toast(err.message || "فشل إنشاء الحساب", "error");
            } finally {
              App.setLoading(btn, false);
            }
          });
      })();
    </script>
  </body>
</html>
