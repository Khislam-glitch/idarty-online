<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب - إدارتي أونلاين</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .register-container {
        background: white;
        border-radius: 30px;
        padding: 50px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: right;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }
      input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
      }
      .login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
      }
      .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }
      .error,
      .success {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .error {
        background: #fee;
        color: #c33;
      }
      .success {
        background: #efe;
        color: #3c3;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <h1>إنشاء حساب جديد</h1>
      <p class="subtitle">انضم إلى منصة إدارتي أونلاين</p>
      <div id="errorMsg" class="error"></div>
      <div id="successMsg" class="success"></div>
      <form id="registerForm">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input
            type="text"
            id="username"
            required
            placeholder="أدخل اسم المستخدم"
          />
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input
            type="email"
            id="email"
            required
            placeholder="example@univ-ouargla.dz"
          />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input
            type="password"
            id="password"
            required
            placeholder="********"
          />
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <input
            type="password"
            id="confirmPassword"
            required
            placeholder="********"
          />
        </div>
        <button type="submit">إنشاء حساب</button>
      </form>
      <div class="login-link">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username  = document.getElementById("username").value.trim();
        const email     = document.getElementById("email").value.trim();
        const password  = document.getElementById("password").value;
        const confirm   = document.getElementById("confirmPassword").value;
        const errEl     = document.getElementById("errorMsg");
        const okEl      = document.getElementById("successMsg");

        errEl.style.display = "none";
        okEl.style.display  = "none";

        if (password !== confirm) {
          errEl.textContent = "كلمة المرور غير متطابقة";
          errEl.style.display = "block";
          return;
        }
        if (password.length < 6) {
          errEl.textContent = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
          errEl.style.display = "block";
          return;
        }

        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { username, role: "user" } },
          });
          if (error) throw error;

          // Also insert a row into the profiles table
          if (data.user) {
            await supabase.from("profiles").upsert({
              id:       data.user.id,
              username,
              email,
              role:     "user",
            });
          }

          okEl.textContent    = "تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.";
          okEl.style.display  = "block";
          setTimeout(() => { window.location.href = "login.html"; }, 2000);
        } catch (err) {
          errEl.textContent   = err.message || "حدث خطأ أثناء التسجيل";
          errEl.style.display = "block";
        }
      });
    </script>
  </body>
</html>
